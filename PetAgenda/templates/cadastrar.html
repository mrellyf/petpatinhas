<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Novo Agendamento</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Novo Agendamento</h1>

    <form method="POST" action="/cadastrar">

        <input type="text" name="tutor" placeholder="Nome do Tutor" required>

        <input type="text" name="pet" placeholder="Nome do Pet" required>

        <select name="servico" required>
            <option value="">Selecione um serviço</option>
            <option value="1">Banho</option>
            <option value="2">Tosa</option>
            <option value="3">Banho + Tosa</option>
        </select>

        <input type="date" name="data" required>

        <input type="time" name="hora" required>

        <button type="submit">Salvar Agendamento</button>

    </form>

</div>

</body>
</html>

{% extends "base.html" %}

{% block conteudo %}

<h2 class="mb-4">Agendamentos</h2>

<table class="table table-striped table-hover">

    <thead class="table-primary">
        <tr>
            <th>Tutor</th>
            <th>Pet</th>
            <th>Serviço</th>
            <th>Data</th>
            <th>Horário</th>
            <th>Ações</th>
        </tr>
    </thead>

    <tbody>

        {% for agendamento in agendamentos %}

        <tr>
            <td>{{ agendamento[1] }}</td>
            <td>{{ agendamento[2] }}</td>
            <td>{{ agendamento[3] }}</td>
            <td>{{ agendamento[4] }}</td>
            <td>{{ agendamento[5] }}</td>

            <td>
               <a href="/editar/{{ agendamento[0] }}" class="btn btn-warning btn-sm">
    Editar
</a>

<a href="/excluir/{{ agendamento[0] }}"
   class="btn btn-danger btn-sm"
   onclick="return confirm('Deseja realmente excluir este agendamento?')">
    Excluir
</a>
            </td>
        </tr>

        {% endfor %}

    </tbody>

</table>

<a href="/" class="btn btn-secondary">
    Voltar
</a>

{% endblock %}
